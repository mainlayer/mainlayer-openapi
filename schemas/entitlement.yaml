type: object
description: Represents a granted right for a payer to access a specific resource.
required:
  - id
  - resource_id
  - payer_wallet
  - status
  - granted_at
properties:
  id:
    type: string
    description: Unique entitlement identifier.
    example: ent_01HX4K9ZRMN8QWTBGX2V3F5PB
  resource_id:
    type: string
    format: uuid
    description: The resource this entitlement grants access to.
    example: res_01HX4K9ZRMN8QWTBGX2V3F5P7
  resource_slug:
    type: string
    description: Slug of the entitled resource.
    example: gpt-summarizer-v2
  payer_wallet:
    type: string
    description: Identifier of the agent or user that holds this entitlement.
    example: agt_wallet_7f3a9c2e1b
  payment_id:
    type: string
    description: The payment that created this entitlement.
    example: pay_01HX4K9ZRMN8QWTBGX2V3F5PA
  subscription_id:
    type: string
    description: The subscription associated with this entitlement, if applicable.
    example: sub_01HX4K9ZRMN8QWTBGX2V3F5PC
  status:
    type: string
    description: Whether the entitlement is currently valid.
    enum:
      - active
      - expired
      - revoked
    example: active
  fee_model:
    type: string
    description: The billing model that backs this entitlement.
    enum:
      - per_call
      - subscription_monthly
      - subscription_yearly
      - pay_per_token
      - revenue_share
    example: per_call
  access_count:
    type: integer
    description: Number of times this entitlement has been exercised.
    example: 12
  granted_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp when access was first granted.
    example: '2026-03-28T11:42:01Z'
  expires_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp when the entitlement expires. Null for per_call grants.
    nullable: true
    example: '2026-04-28T11:42:01Z'
  last_accessed_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the most recent access.
    nullable: true
    example: '2026-03-30T08:15:22Z'
